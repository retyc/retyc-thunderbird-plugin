name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  build:
    name: Build & Type-check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build (production)
        run: npm run build

      - name: Lint source
        run: npm run lint

      - name: Validate manifest (web-ext lint)
        run: npx web-ext lint --source-dir=. --self-hosted
        continue-on-error: true

      - name: Upload build artifact
        if: matrix.node == '20'
        uses: actions/upload-artifact@v7
        with:
          name: retyc-thunderbird-plugin-${{ github.sha }}
          path: |
            dist/
            assets/
            manifest.json
            README.md
            LICENSE
          retention-days: 30

  package:
    name: Package .xpi for release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: retyc-thunderbird-plugin-${{ github.sha }}

      - name: Check tag matches manifest version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "❌ Tag '$TAG' does not match manifest version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "✅ Tag '$TAG' matches manifest version '$MANIFEST_VERSION'"
          echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Package .xpi
        run: |
          npx web-ext@10 build \
            --source-dir=. \
            --artifacts-dir=artifacts \
            --filename "retyc-thunderbird-plugin-${{ steps.version.outputs.version }}.xpi" \
            --ignore-files="src/**" \
            --ignore-files="node_modules/**" \
            --ignore-files="webpack.config.js" \
            --ignore-files="eslint.config.*" \
            --ignore-files="tsconfig.json" \
            --ignore-files="package*.json" \
            --ignore-files=".github/**" \
            --ignore-files=".claude/**" \
            --ignore-files=".idea/**" \
            --ignore-files="CLAUDE.md"

      - name: Upload .xpi to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/retyc-thunderbird-plugin-${{ steps.version.outputs.version }}.xpi
