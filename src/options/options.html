<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retyc – Settings</title>
</head>
<body>
  <div class="container">
    <header>
      <img src="../assets/icons/icon-48.png" alt="Retyc" class="logo" />
      <div>
        <h1>Retyc Settings</h1>
        <p class="subtitle">Secure file transfer for Thunderbird</p>
      </div>
    </header>

    <form id="settings-form" novalidate>
      <section id="account-section" class="hidden">
        <h2>Account</h2>

        <div class="account-card">
          <div class="account-info">
            <span id="account-fullname" class="account-fullname"></span>
            <span id="account-email" class="account-email"></span>
            <span id="account-expires" class="account-expires"></span>
          </div>
          <button type="button" id="btn-refresh" class="btn-icon-round" title="Refresh token" aria-label="Refresh token">↻</button>
        </div>

        <div id="quota-block" class="quota-block hidden">
          <div class="quota-row">
            <div class="quota-row-header">
              <span class="quota-label">Storage</span>
              <span id="quota-storage-text" class="quota-value"></span>
            </div>
            <div class="progress"><div id="quota-storage-bar" class="progress-fill"></div></div>
          </div>

          <div id="quota-transfers-row" class="quota-row hidden">
            <div class="quota-row-header">
              <span class="quota-label">Transfers</span>
              <span id="quota-transfers-text" class="quota-value"></span>
            </div>
            <div class="progress"><div id="quota-transfers-bar" class="progress-fill"></div></div>
          </div>
        </div>

        <button type="button" id="btn-logout" class="btn btn-secondary">Log out</button>
      </section>

      <section id="auth-section" class="hidden">
        <h2>Authentication</h2>

        <div id="auth-unauthenticated" class="auth-block hidden">
          <div class="status-badge error"><span class="dot"></span>Not connected</div>
          <button type="button" id="btn-login" class="btn btn-primary">Log in with Retyc</button>
          <div class="signup-row">
            <span>New to Retyc?</span>
            <a href="https://retyc.com/" target="_blank" rel="noopener noreferrer" class="signup-link">Sign up</a>
          </div>
        </div>

        <div id="auth-device-flow" class="auth-block hidden">
          <p class="hint">Open this URL in your browser and enter the code:</p>
          <a id="verification-url" href="#" target="_blank" class="verification-link"></a>
          <div class="code-box">
            <span id="user-code" class="user-code"></span>
          </div>
          <p class="hint">Waiting for authentication… <span class="spinner-inline"></span></p>
          <button type="button" id="btn-cancel-login" class="btn btn-secondary">Cancel</button>
        </div>
      </section>

      <section>
        <h2>Setup</h2>
        <label class="field field-inline">
          <input type="checkbox" id="auto-send" name="autoSend" />
          <span>
            <span class="field-label">Send automatically after upload</span>
            <span class="field-hint">When enabled, the email is sent immediately after files are uploaded to Retyc (1-step). Disable to review the message first before clicking Send manually (2-step).</span>
          </span>
        </label>
      </section>

      <div id="save-feedback" class="feedback hidden"></div>

      <div class="form-actions">
        <button type="submit" id="btn-save" class="btn btn-primary">Save settings</button>
      </div>
    </form>
  </div>
</body>
</html>
